<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kronos Polymarket Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, system-ui, sans-serif;
            background: #0a0e17;
            color: #c9d1d9;
            min-height: 100vh;
        }
        nav {
            background: linear-gradient(135deg, #0f172a 0%, #1a1f36 100%);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            border-bottom: 1px solid #1e293b;
        }
        nav .brand {
            font-weight: 800; font-size: 1.1rem;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        nav a { color: #64748b; text-decoration: none; font-size: 0.85rem; transition: color 0.2s; }
        nav a:hover, nav a.active { color: #38bdf8; font-weight: 600; }
        nav .sep { width: 1px; height: 20px; background: #1e293b; }
        .global-stats { margin-left: auto; display: flex; gap: 16px; align-items: center; font-size: 0.78rem; }
        .global-stats .gs-item { display: flex; gap: 4px; align-items: center; }
        .gs-label { color: #64748b; }
        .gs-value { font-weight: 700; }

        .dashboard { max-width: 1600px; margin: 0 auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }

        /* ── Control Panel ── */
        .control-panel {
            background: linear-gradient(135deg, #111827, #1e293b);
            border-radius: 12px; padding: 16px 20px; border: 1px solid #1e293b;
            display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap;
        }
        .ctrl-group { display: flex; flex-direction: column; gap: 4px; }
        .ctrl-group label { font-size: 0.72rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .ctrl-group select, .ctrl-group input {
            padding: 8px 12px; border: 1px solid #1e293b; border-radius: 8px;
            font-size: 0.85rem; background: #0f172a; color: #e2e8f0; min-width: 120px;
        }
        .ctrl-group select:focus, .ctrl-group input:focus { border-color: #38bdf8; outline: none; }
        .btn-action {
            padding: 9px 24px; border: none; border-radius: 8px;
            font-size: 0.88rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
        }
        .btn-go { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; }
        .btn-action:hover { transform: translateY(-1px); filter: brightness(1.1); }
        .btn-action:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* ── Session Cards Row ── */
        .sessions-row {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px;
        }
        .session-card {
            background: linear-gradient(135deg, #111827, #1e293b);
            border-radius: 10px; padding: 14px; border: 1px solid #1e293b;
            cursor: pointer; transition: border-color 0.2s;
            position: relative;
        }
        .session-card.selected { border-color: #38bdf8; }
        .session-card.running { border-left: 3px solid #22c55e; }
        .session-card.stopped { border-left: 3px solid #64748b; }
        .session-card.error { border-left: 3px solid #ef4444; }
        .sc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .sc-title { font-weight: 700; font-size: 0.95rem; }
        .sc-status { padding: 2px 8px; border-radius: 10px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; }
        .sc-status-running { background: #166534; color: #86efac; }
        .sc-status-stopped { background: #374151; color: #9ca3af; }
        .sc-status-error { background: #7f1d1d; color: #fca5a5; }
        .sc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; font-size: 0.78rem; }
        .sc-label { color: #64748b; }
        .sc-val { color: #e2e8f0; font-weight: 600; text-align: right; }
        .sc-val.pos { color: #4ade80; }
        .sc-val.neg { color: #f87171; }
        .sc-pred { margin-top: 6px; text-align: center; }
        .sc-stop {
            position: absolute; top: 10px; right: 10px; background: none; border: none;
            color: #64748b; font-size: 1.1rem; cursor: pointer; padding: 2px 6px;
        }
        .sc-stop:hover { color: #ef4444; }
        .empty-sessions { text-align: center; padding: 30px; color: #475569; font-size: 0.9rem; }

        /* ── Detail Area (selected session) ── */
        .detail-area {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
        }
        .detail-left { display: flex; flex-direction: column; gap: 12px; }
        .detail-right { display: flex; flex-direction: column; gap: 12px; }

        .chart-panel {
            background: linear-gradient(135deg, #111827, #1e293b);
            border-radius: 10px; padding: 14px; border: 1px solid #1e293b;
        }
        .panel-title { font-size: 0.8rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }

        .log-panel {
            background: linear-gradient(135deg, #111827, #1e293b);
            border-radius: 10px; padding: 14px; border: 1px solid #1e293b;
            min-height: 200px; max-height: 400px; overflow-y: auto; flex: 1;
        }
        .log-panel .panel-title {
            position: sticky; top: 0; background: #111827; padding: 4px 0; z-index: 1;
            display: flex; justify-content: space-between; align-items: center;
        }
        .log-filter { font-size: 0.72rem; padding: 2px 8px; border: 1px solid #1e293b; border-radius: 4px; background: #0f172a; color: #94a3b8; }
        .log-line {
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 0.76rem; padding: 2px 0; line-height: 1.4;
            border-bottom: 1px solid rgba(30,41,59,0.5);
        }
        .log-time { color: #475569; }
        .log-sid { color: #818cf8; font-weight: 600; font-size: 0.68rem; }
        .log-info { color: #94a3b8; }
        .log-warning { color: #fbbf24; }
        .log-error { color: #f87171; }
        .log-up { color: #4ade80; font-weight: 700; }
        .log-down { color: #f87171; font-weight: 700; }
        .log-settled-won { color: #4ade80; font-weight: 700; }
        .log-settled-lost { color: #f87171; font-weight: 700; }
        .log-bet { color: #38bdf8; font-weight: 600; }

        /* ── Bets Table ── */
        .bets-panel {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #111827, #1e293b);
            border-radius: 10px; padding: 14px; border: 1px solid #1e293b;
        }
        .bets-table { width: 100%; font-size: 0.78rem; border-collapse: collapse; }
        .bets-table th {
            text-align: left; padding: 6px 10px; color: #64748b;
            border-bottom: 1px solid #1e293b; font-size: 0.72rem;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .bets-table td { padding: 6px 10px; border-bottom: 1px solid rgba(30,41,59,0.3); }
        .bets-table tr:hover td { background: rgba(56,189,248,0.03); }
        .badge-up { background: #166534; color: #86efac; padding: 2px 8px; border-radius: 4px; font-weight: 700; font-size: 0.72rem; }
        .badge-down { background: #7f1d1d; color: #fca5a5; padding: 2px 8px; border-radius: 4px; font-weight: 700; font-size: 0.72rem; }
        .badge-flat { background: #374151; color: #9ca3af; padding: 2px 8px; border-radius: 4px; font-weight: 700; font-size: 0.72rem; }
        .badge-open { background: #1e3a5f; color: #93c5fd; padding: 2px 8px; border-radius: 4px; font-size: 0.72rem; }
        .badge-won { background: #166534; color: #86efac; padding: 2px 8px; border-radius: 4px; font-size: 0.72rem; }
        .badge-lost { background: #7f1d1d; color: #fca5a5; padding: 2px 8px; border-radius: 4px; font-size: 0.72rem; }
        .pred-badge { display: inline-block; padding: 4px 12px; border-radius: 6px; font-size: 0.95rem; font-weight: 800; text-transform: uppercase; }
        .pred-up { background: #166534; color: #86efac; }
        .pred-down { background: #7f1d1d; color: #fca5a5; }
        .pred-flat { background: #374151; color: #9ca3af; }
        .positive { color: #4ade80; }
        .negative { color: #f87171; }
        .neutral { color: #94a3b8; }
        .accent { color: #38bdf8; }

        @media (max-width: 900px) {
            .detail-area { grid-template-columns: 1fr; }
            .sessions-row { grid-template-columns: 1fr; }
            .control-panel { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <nav>
        <span class="brand">KRONOS</span>
        <div class="sep"></div>
        <a href="/">Prediction</a>
        <a href="/backtest">Backtest</a>
        <a href="/compare">Compare</a>
        <a href="/live">Live MT5</a>
        <a href="/polymarket" class="active">Polymarket</a>
        <div class="global-stats">
            <div class="gs-item"><span class="gs-label">Sessions:</span> <span class="gs-value" id="g-sessions">0</span></div>
            <div class="gs-item"><span class="gs-label">P&L:</span> <span class="gs-value neutral" id="g-pnl">0.00 EUR</span></div>
        </div>
    </nav>

    <div class="dashboard">
        <!-- ── Control: always visible, can launch N sessions ── -->
        <div class="control-panel">
            <div class="ctrl-group">
                <label>Symbol</label>
                <select id="cfg-symbol">
                    <option value="BTCUSDT" selected>BTC/USDT</option>
                    <option value="ETHUSDT">ETH/USDT</option>
                </select>
            </div>
            <div class="ctrl-group">
                <label>Modele</label>
                <select id="cfg-model">
                    <option value="mini">Kronos-mini (4.1M)</option>
                    <option value="small" selected>Kronos-small (24.7M)</option>
                    <option value="base">Kronos-base (102.3M)</option>
                </select>
            </div>
            <div class="ctrl-group">
                <label>Bet (EUR)</label>
                <input type="number" id="cfg-bet" value="1.0" step="0.5" min="0.5" max="50" style="min-width:80px;">
            </div>
            <div class="ctrl-group">
                <label>Samples</label>
                <input type="number" id="cfg-samples" value="5" min="1" max="20" style="min-width:70px;">
            </div>
            <div class="ctrl-group">
                <label>Device</label>
                <select id="cfg-device" style="min-width:90px;">
                    <option value="">Auto</option>
                    <option value="cuda">CUDA</option>
                    <option value="cpu">CPU</option>
                </select>
            </div>
            <button class="btn-action btn-go" onclick="startSession()">+ Lancer</button>
        </div>

        <!-- ── Session Cards ── -->
        <div class="sessions-row" id="sessions-row">
            <div class="empty-sessions" id="empty-sessions">Aucune session. Configurez et lancez-en une.</div>
        </div>

        <!-- ── Detail (selected session) ── -->
        <div class="detail-area" id="detail-area" style="display:none;">
            <div class="detail-left">
                <div class="chart-panel">
                    <div class="panel-title">P&L cumule &mdash; <span id="detail-title">--</span></div>
                    <div id="pnl-chart" style="height:220px;"></div>
                </div>
                <div class="bets-panel">
                    <div class="panel-title">Historique des bets</div>
                    <div id="bets-container">
                        <table class="bets-table" id="bets-table" style="display:none;">
                            <thead><tr><th>Time</th><th>Dir</th><th>Cote</th><th>Mise</th><th>Profit</th><th>Status</th><th>Actual</th></tr></thead>
                            <tbody id="bets-tbody"></tbody>
                        </table>
                        <div id="bets-empty" style="text-align:center;color:#475569;padding:20px;font-size:0.85rem;">Aucun bet</div>
                    </div>
                </div>
            </div>
            <div class="detail-right">
                <div class="log-panel" id="log-panel">
                    <div class="panel-title">
                        <span>Logs</span>
                        <select class="log-filter" id="log-filter" onchange="renderAllLogs()">
                            <option value="all">Toutes les sessions</option>
                            <option value="selected">Session selectionnee</option>
                        </select>
                    </div>
                    <div id="log-stream"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ─── State ──────────────────────────────────────────────
        var sessions = {};       // sid -> state snapshot
        var sseConns = {};       // sid -> EventSource
        var allLogs = [];        // {sid, timestamp, level, message}
        var selectedSid = null;
        var MAX_LOGS = 600;

        // ─── Start / Stop ───────────────────────────────────────
        async function startSession() {
            var config = {
                symbol: document.getElementById('cfg-symbol').value,
                model_key: document.getElementById('cfg-model').value,
                bet_amount: parseFloat(document.getElementById('cfg-bet').value),
                samples: parseInt(document.getElementById('cfg-samples').value),
                device: document.getElementById('cfg-device').value || null,
                timeframe: 'M5',
            };
            try {
                var resp = await fetch('/api/polymarket/start', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(config),
                });
                var data = await resp.json();
                if (data.success) {
                    connectSSE(data.session_id);
                } else {
                    alert('Erreur: ' + data.error);
                }
            } catch(e) { alert('Erreur: ' + e.message); }
        }

        async function stopSession(sid) {
            try {
                await fetch('/api/polymarket/stop', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({session_id: sid}),
                });
            } catch(e) { console.error(e); }
            if (sseConns[sid]) { sseConns[sid].close(); delete sseConns[sid]; }
        }

        // ─── SSE ────────────────────────────────────────────────
        function connectSSE(sid) {
            if (sseConns[sid]) { sseConns[sid].close(); }
            var es = new EventSource('/api/polymarket/stream?session_id=' + encodeURIComponent(sid));
            es.onmessage = function(e) {
                var msg = JSON.parse(e.data);
                if (msg.type === 'log') {
                    msg.data._sid = sid;
                    allLogs.push(msg.data);
                    if (allLogs.length > MAX_LOGS) allLogs.shift();
                    renderNewLog(msg.data);
                } else if (msg.type === 'state') {
                    sessions[sid] = msg.data;
                    renderSessions();
                    if (sid === selectedSid) renderDetail(msg.data);
                    renderGlobalStats();
                } else if (msg.type === 'done') {
                    if (sseConns[sid]) { sseConns[sid].close(); delete sseConns[sid]; }
                }
            };
            es.onerror = function() {
                setTimeout(function() { if (sessions[sid] && sessions[sid].status === 'running') connectSSE(sid); }, 3000);
            };
            sseConns[sid] = es;
            selectedSid = sid;
        }

        // ─── Session Cards ──────────────────────────────────────
        function renderSessions() {
            var container = document.getElementById('sessions-row');
            var keys = Object.keys(sessions);
            if (keys.length === 0) {
                container.innerHTML = '<div class="empty-sessions">Aucune session. Configurez et lancez-en une.</div>';
                document.getElementById('detail-area').style.display = 'none';
                return;
            }
            var html = '';
            for (var i = 0; i < keys.length; i++) {
                var sid = keys[i];
                var s = sessions[sid];
                var st = s.status || 'stopped';
                var sel = sid === selectedSid ? ' selected' : '';
                var pnl = (s.summary && s.summary.total_pnl_eur) || 0;
                var pnlCls = pnl >= 0 ? 'pos' : 'neg';
                var pred = s.last_prediction;
                var predHtml = '--';
                if (pred) {
                    var pcls = pred.direction === 'UP' ? 'pred-up' : pred.direction === 'DOWN' ? 'pred-down' : 'pred-flat';
                    predHtml = '<span class="pred-badge ' + pcls + '">' + escapeHtml(pred.direction) + '</span>';
                }
                html += '<div class="session-card ' + st + sel + '" onclick="selectSession(\'' + sid + '\')">';
                html += '<div class="sc-header"><span class="sc-title">' + escapeHtml(s.symbol || '?') + ' / ' + escapeHtml(s.model_key || '?') + '</span>';
                html += '<span class="sc-status sc-status-' + st + '">' + st + '</span></div>';
                html += '<div class="sc-grid">';
                html += '<span class="sc-label">P&L</span><span class="sc-val ' + pnlCls + '">' + (pnl >= 0 ? '+' : '') + pnl.toFixed(2) + ' EUR</span>';
                html += '<span class="sc-label">Accuracy</span><span class="sc-val">' + ((s.summary && s.summary.accuracy) || 0) + '%</span>';
                html += '<span class="sc-label">Bets</span><span class="sc-val">' + ((s.summary && s.summary.total_bets) || 0) + ' (' + ((s.summary && s.summary.wins) || 0) + 'W)</span>';
                html += '<span class="sc-label">Cycle</span><span class="sc-val">' + (s.cycle || 0) + '</span>';
                html += '</div>';
                html += '<div class="sc-pred">' + predHtml + '</div>';
                if (st === 'running') {
                    html += '<button class="sc-stop" onclick="event.stopPropagation();stopSession(\'' + sid + '\')" title="Arreter">&#x23F9;</button>';
                }
                html += '</div>';
            }
            container.innerHTML = html;
            document.getElementById('detail-area').style.display = selectedSid ? '' : 'none';
        }

        function selectSession(sid) {
            selectedSid = sid;
            renderSessions();
            if (sessions[sid]) renderDetail(sessions[sid]);
            renderAllLogs();
        }

        // ─── Global Stats ───────────────────────────────────────
        function renderGlobalStats() {
            var keys = Object.keys(sessions);
            document.getElementById('g-sessions').textContent = keys.length;
            var totalPnl = 0;
            for (var i = 0; i < keys.length; i++) {
                var s = sessions[keys[i]];
                if (s.summary) totalPnl += s.summary.total_pnl_eur || 0;
            }
            var el = document.getElementById('g-pnl');
            el.textContent = (totalPnl >= 0 ? '+' : '') + totalPnl.toFixed(2) + ' EUR';
            el.className = 'gs-value ' + (totalPnl >= 0 ? 'positive' : 'negative');
        }

        // ─── Detail View ─────────────────────────────────────────
        var pnlChartInit = false;
        function renderDetail(state) {
            document.getElementById('detail-title').textContent = (state.symbol || '?') + ' / ' + (state.model_key || '?');

            // P&L Chart
            if (state.pnl_history && state.pnl_history.length > 1) {
                var times = state.pnl_history.map(function(h) { return h.timestamp.substring(11, 19); });
                var pnls = state.pnl_history.map(function(h) { return h.cum_pnl; });
                var traces = [{
                    x: times, y: pnls, name: 'P&L', type: 'scatter', mode: 'lines+markers',
                    line: { color: '#38bdf8', width: 2 }, marker: { size: 4 },
                    fill: 'tozeroy', fillcolor: 'rgba(56,189,248,0.08)',
                }];
                var layout = {
                    template: 'plotly_dark', paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
                    margin: { l: 50, r: 10, t: 10, b: 30 }, height: 220,
                    xaxis: { gridcolor: '#1e293b', tickfont: { size: 10 } },
                    yaxis: { title: '', gridcolor: '#1e293b', tickfont: { size: 10 }, ticksuffix: ' EUR' },
                    showlegend: false,
                };
                if (!pnlChartInit) {
                    Plotly.newPlot('pnl-chart', traces, layout, {responsive: true, displayModeBar: false});
                    pnlChartInit = true;
                } else {
                    Plotly.update('pnl-chart', traces, layout);
                }
            }

            // Bets table
            var openBets = state.open_bets || [];
            var settledBets = state.settled_bets || [];
            var table = document.getElementById('bets-table');
            var tbody = document.getElementById('bets-tbody');
            var empty = document.getElementById('bets-empty');
            if (openBets.length === 0 && settledBets.length === 0) {
                table.style.display = 'none'; empty.style.display = ''; return;
            }
            table.style.display = ''; empty.style.display = 'none';
            var html = '';
            for (var i = 0; i < openBets.length; i++) {
                var b = openBets[i];
                var dCls = b.direction === 'UP' ? 'badge-up' : b.direction === 'DOWN' ? 'badge-down' : 'badge-flat';
                html += '<tr><td>' + (b.timestamp || '').substring(11,19) + '</td>';
                html += '<td><span class="' + dCls + '">' + escapeHtml(b.direction) + '</span></td>';
                html += '<td>' + (b.pm_buy_price != null ? b.pm_buy_price.toFixed(4) : '--') + '</td>';
                html += '<td>' + (b.bet_amount != null ? b.bet_amount.toFixed(2) : '--') + '</td>';
                html += '<td class="neutral">--</td>';
                html += '<td><span class="badge-open">OPEN</span></td><td>--</td></tr>';
            }
            var rev = settledBets.slice().reverse();
            for (var j = 0; j < rev.length; j++) {
                var b2 = rev[j];
                var dc = b2.side === 'Up' ? 'badge-up' : 'badge-down';
                var wc = b2.won ? 'badge-won' : 'badge-lost';
                var pc = b2.profit_eur >= 0 ? 'positive' : 'negative';
                html += '<tr><td>' + (b2.timestamp || '').substring(11,19) + '</td>';
                html += '<td><span class="' + dc + '">' + escapeHtml(b2.side) + '</span></td>';
                html += '<td>' + (b2.buy_price != null ? b2.buy_price.toFixed(4) : '--') + '</td>';
                html += '<td>' + (b2.bet_amount != null ? b2.bet_amount.toFixed(2) : '--') + '</td>';
                html += '<td class="' + pc + '">' + (b2.profit_eur >= 0 ? '+' : '') + (b2.profit_eur != null ? b2.profit_eur.toFixed(2) : '--') + '</td>';
                html += '<td><span class="' + wc + '">' + (b2.won ? 'WON' : 'LOST') + '</span></td>';
                html += '<td>' + escapeHtml(b2.actual_direction || '--') + '</td></tr>';
            }
            tbody.innerHTML = html;
        }

        // ─── Log Stream ─────────────────────────────────────────
        function renderNewLog(log) {
            // Only render if it matches the filter
            var filter = document.getElementById('log-filter').value;
            if (filter === 'selected' && log._sid !== selectedSid) return;

            var stream = document.getElementById('log-stream');
            var panel = document.getElementById('log-panel');
            var line = buildLogLine(log);
            stream.appendChild(line);
            while (stream.children.length > MAX_LOGS) stream.removeChild(stream.firstChild);
            panel.scrollTop = panel.scrollHeight;
        }

        function renderAllLogs() {
            var stream = document.getElementById('log-stream');
            var panel = document.getElementById('log-panel');
            stream.textContent = '';
            var filter = document.getElementById('log-filter').value;
            for (var i = 0; i < allLogs.length; i++) {
                var log = allLogs[i];
                if (filter === 'selected' && log._sid !== selectedSid) continue;
                stream.appendChild(buildLogLine(log));
            }
            panel.scrollTop = panel.scrollHeight;
        }

        function buildLogLine(log) {
            var timeStr = log.timestamp ? log.timestamp.substring(11, 19) : '';
            var msg = log.message || '';
            var sidShort = (log._sid || '').substring(0, 4);

            var line = document.createElement('div');
            line.className = 'log-line';

            var timeSpan = document.createElement('span');
            timeSpan.className = 'log-time';
            timeSpan.textContent = timeStr;

            var sidSpan = document.createElement('span');
            sidSpan.className = 'log-sid';
            sidSpan.textContent = '[' + sidShort + ']';

            var msgSpan = document.createElement('span');
            var levelClass = log.level === 'ERROR' ? 'log-error' : log.level === 'WARNING' ? 'log-warning' : 'log-info';

            if (msg.indexOf('KRONOS | UP') !== -1) {
                addHighlightedLog(msgSpan, msg, 'UP', 'log-up', levelClass);
            } else if (msg.indexOf('KRONOS | DOWN') !== -1) {
                addHighlightedLog(msgSpan, msg, 'DOWN', 'log-down', levelClass);
            } else if (msg.indexOf('SETTLED | +') !== -1) {
                addHighlightedLog(msgSpan, msg, 'SETTLED', 'log-settled-won', levelClass);
            } else if (msg.indexOf('SETTLED | -') !== -1) {
                addHighlightedLog(msgSpan, msg, 'SETTLED', 'log-settled-lost', levelClass);
            } else if (msg.indexOf('BET ') !== -1) {
                addHighlightedLog(msgSpan, msg, 'BET', 'log-bet', levelClass);
            } else {
                msgSpan.className = levelClass;
                msgSpan.textContent = msg;
            }

            line.appendChild(timeSpan);
            line.appendChild(document.createTextNode(' '));
            line.appendChild(sidSpan);
            line.appendChild(document.createTextNode(' '));
            line.appendChild(msgSpan);
            return line;
        }

        function addHighlightedLog(container, msg, keyword, highlightClass, baseClass) {
            var idx = msg.indexOf(keyword);
            if (idx === -1) { container.textContent = msg; return; }
            var before = msg.substring(0, idx);
            var after = msg.substring(idx + keyword.length);
            if (before) {
                var s1 = document.createElement('span');
                s1.className = baseClass;
                s1.textContent = before;
                container.appendChild(s1);
            }
            var kw = document.createElement('span');
            kw.className = highlightClass;
            kw.textContent = keyword;
            container.appendChild(kw);
            if (after) {
                var s2 = document.createElement('span');
                s2.className = baseClass;
                s2.textContent = after;
                container.appendChild(s2);
            }
        }

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ─── Poll for sessions not tracked by SSE ────────────────
        async function pollAll() {
            try {
                var resp = await fetch('/api/polymarket/status');
                var data = await resp.json();
                var all = data.sessions || {};
                for (var sid in all) {
                    if (!sessions[sid] && all[sid].status === 'running') {
                        connectSSE(sid);
                    } else if (sessions[sid] && all[sid].status !== 'running') {
                        sessions[sid] = all[sid];
                    }
                }
            } catch(e) { /* ignore */ }
        }
        setInterval(pollAll, 10000);
        pollAll();
    </script>
</body>
